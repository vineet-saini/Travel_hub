<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title}, ~{::body})}">
<head><title th:text="${country} + ' Destinations | TravelHub'">Country</title></head>
<body>
<div class="container py-5">

  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/home}" style="color:#e94560;">Home</a></li>
      <li class="breadcrumb-item active" th:text="${country}">Country</li>
    </ol>
  </nav>

  <div class="text-center mb-5">
    <h2 class="section-title" th:text="'Explore ' + ${country}">Country</h2>
    <p class="section-subtitle">Choose a destination and discover amazing travel packages</p>
  </div>

  <div class="row g-4">
    <div th:each="place : ${places}" class="col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm overflow-hidden">
        <div class="position-relative">
          <img th:src="@{'/images/' + ${place.toLowerCase().replace(' ','')} + '.jpg'}"
               class="card-img-top" style="height:200px; object-fit:cover;" alt="">
          <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);"></div>
          <div style="position:absolute; bottom:0.75rem; left:0.75rem; color:#fff;">
            <div class="fw-bold" th:text="${place}"></div>
          </div>
        </div>
        <div class="card-body p-3">
          <div class="d-flex align-items-center gap-1 mb-2">
            <i class="fas fa-star text-warning" style="font-size:0.8rem;"></i>
            <i class="fas fa-star text-warning" style="font-size:0.8rem;"></i>
            <i class="fas fa-star text-warning" style="font-size:0.8rem;"></i>
            <i class="fas fa-star text-warning" style="font-size:0.8rem;"></i>
            <i class="fas fa-star-half-alt text-warning" style="font-size:0.8rem;"></i>
            <span class="text-muted" style="font-size:0.8rem;">4.8</span>
          </div>
          <p class="text-muted small mb-3">Explore curated tour packages with best price guarantee.</p>
          <a th:href="@{/place/{id}(id=${place})}" class="btn btn-primary w-100">
            <i class="fas fa-suitcase-rolling me-1"></i>View Packages
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-5">
    <a th:href="@{/home}" class="btn btn-outline-secondary px-4">
      <i class="fas fa-arrow-left me-2"></i>Back to Home
    </a>
  </div>
</div>
</body>
</html>
