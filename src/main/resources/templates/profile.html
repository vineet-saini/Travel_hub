<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title}, ~{::body})}">
<head><title>My Profile | TravelHub</title></head>
<body>

<!-- Profile Hero Banner -->
<div style="background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%); padding:3rem 0 6rem;">
  <div class="container text-center text-white">
    <div class="position-relative d-inline-block mb-3">
      <div style="width:100px;height:100px;background:linear-gradient(135deg,#e94560,#c73652);
           border-radius:50%;display:flex;align-items:center;justify-content:center;
           font-size:2.8rem;color:#fff;font-weight:700;border:4px solid rgba(255,255,255,0.2);
           margin:0 auto;">
        <span th:text="${user.username?.substring(0,1)?.toUpperCase()}">U</span>
      </div>
      <div style="position:absolute;bottom:4px;right:4px;width:22px;height:22px;
           background:#56ab2f;border-radius:50%;border:2px solid #fff;"></div>
    </div>
    <h4 class="fw-bold mb-1" th:text="${user.fullName ?: user.username}">Username</h4>
    <p style="color:rgba(255,255,255,0.6); font-size:0.9rem;" th:text="${user.email}">email</p>
    <span style="background:rgba(255,255,255,0.15);backdrop-filter:blur(4px);
          border-radius:20px;padding:5px 16px;font-size:0.8rem;color:#fff;">
      <i class="fas fa-user-check me-1" style="color:#56ab2f;"></i>Verified Member
    </span>
  </div>
</div>

<div class="container pb-5" style="max-width:900px; margin-top:-3.5rem;">

  <div th:if="${success}" class="alert alert-success d-flex align-items-center mb-4"
       style="border-radius:12px; border:none;">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
  </div>

  <div class="row g-4">

    <!-- LEFT: Quick Stats + Nav -->
    <div class="col-lg-4">

      <!-- Stats card -->
      <div class="card shadow-sm mb-4" style="border-radius:16px;">
        <div class="card-body p-0">
          <div class="row g-0 text-center">
            <div class="col-4 p-3" style="border-right:1px solid #f0f0f0;">
              <div class="fw-bold fs-5" style="color:#e94560;" th:text="${totalBookings ?: 0}">0</div>
              <div class="text-muted" style="font-size:0.72rem;">Bookings</div>
            </div>
            <div class="col-4 p-3" style="border-right:1px solid #f0f0f0;">
              <div class="fw-bold fs-5" style="color:#56ab2f;" th:text="${confirmedBookings ?: 0}">0</div>
              <div class="text-muted" style="font-size:0.72rem;">Confirmed</div>
            </div>
            <div class="col-4 p-3">
              <div class="fw-bold fs-5" style="color:#667eea;" th:text="${destinationsVisited ?: 0}">0</div>
              <div class="text-muted" style="font-size:0.72rem;">Destinations</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Navigation card -->
      <div class="card shadow-sm" style="border-radius:16px;">
        <div class="card-body p-2">
          <a th:href="@{/my-bookings}"
             class="d-flex align-items-center gap-3 p-3 text-decoration-none"
             style="border-radius:12px; color:#333; transition:background 0.2s;"
             onmouseover="this.style.background='#f8f9fc'" onmouseout="this.style.background='transparent'">
            <div style="width:40px;height:40px;background:#fff0f3;border-radius:10px;
                 display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-suitcase" style="color:#e94560;"></i>
            </div>
            <div>
              <div class="fw-bold small">My Bookings</div>
              <div class="text-muted" style="font-size:0.75rem;">View all your trips</div>
            </div>
            <i class="fas fa-chevron-right ms-auto text-muted" style="font-size:0.75rem;"></i>
          </a>

          <a th:href="@{/home}"
             class="d-flex align-items-center gap-3 p-3 text-decoration-none"
             style="border-radius:12px; color:#333; transition:background 0.2s;"
             onmouseover="this.style.background='#f8f9fc'" onmouseout="this.style.background='transparent'">
            <div style="width:40px;height:40px;background:#f0f4ff;border-radius:10px;
                 display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-compass" style="color:#667eea;"></i>
            </div>
            <div>
              <div class="fw-bold small">Explore Trips</div>
              <div class="text-muted" style="font-size:0.75rem;">Discover destinations</div>
            </div>
            <i class="fas fa-chevron-right ms-auto text-muted" style="font-size:0.75rem;"></i>
          </a>

          <a th:href="@{/trip-optimizer}"
             class="d-flex align-items-center gap-3 p-3 text-decoration-none"
             style="border-radius:12px; color:#333; transition:background 0.2s;"
             onmouseover="this.style.background='#f8f9fc'" onmouseout="this.style.background='transparent'">
            <div style="width:40px;height:40px;background:linear-gradient(135deg,#667eea20,#764ba220);border-radius:10px;
                 display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-robot" style="color:#764ba2;"></i>
            </div>
            <div>
              <div class="fw-bold small">AI Trip Optimizer</div>
              <div class="text-muted" style="font-size:0.75rem;">Plan your next trip</div>
            </div>
            <i class="fas fa-chevron-right ms-auto text-muted" style="font-size:0.75rem;"></i>
          </a>

          <hr class="my-1 mx-3">

          <form th:action="@{/logout}" method="post">
            <button type="submit"
                    class="d-flex align-items-center gap-3 p-3 w-100 text-decoration-none border-0 bg-transparent"
                    style="border-radius:12px; color:#e94560; cursor:pointer; transition:background 0.2s;"
                    onmouseover="this.style.background='#fff0f3'" onmouseout="this.style.background='transparent'">
              <div style="width:40px;height:40px;background:#fff0f3;border-radius:10px;
                   display:flex;align-items:center;justify-content:center;">
                <i class="fas fa-sign-out-alt" style="color:#e94560;"></i>
              </div>
              <div class="text-start">
                <div class="fw-bold small">Logout</div>
                <div style="font-size:0.75rem; color:#aaa;">Sign out of your account</div>
              </div>
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- RIGHT: Edit Profile -->
    <div class="col-lg-8">
      <div class="card shadow-sm" style="border-radius:16px;">
        <div class="card-header p-4" style="background:#fff; border-bottom:1px solid #f0f0f0; border-radius:16px 16px 0 0;">
          <div class="d-flex align-items-center gap-3">
            <div style="width:44px;height:44px;background:#fff0f3;border-radius:12px;
                 display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-user-edit" style="color:#e94560;"></i>
            </div>
            <div>
              <h5 class="fw-bold mb-0" style="color:#1a1a2e;">Edit Profile</h5>
              <p class="text-muted mb-0" style="font-size:0.82rem;">Update your personal information</p>
            </div>
          </div>
        </div>

        <div class="card-body p-4">
          <form th:action="@{/profile/update}" method="post">

            <!-- Read-only fields -->
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">Username</label>
                <div class="input-group">
                  <span class="input-group-text" style="background:#f8f9fc;border-color:#e8e8e8;">
                    <i class="fas fa-at text-muted"></i>
                  </span>
                  <input type="text" class="form-control" th:value="${user.username}"
                         disabled style="background:#f8f9fc; border-color:#e8e8e8;">
                </div>
                <div class="form-text">Cannot be changed</div>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text" style="background:#f8f9fc;border-color:#e8e8e8;">
                    <i class="fas fa-envelope text-muted"></i>
                  </span>
                  <input type="email" class="form-control" th:value="${user.email}"
                         disabled style="background:#f8f9fc; border-color:#e8e8e8;">
                </div>
              </div>
            </div>

            <!-- Editable fields -->
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                  <input type="text" name="fullName" class="form-control"
                         th:value="${user.fullName}" placeholder="Your full name">
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-phone text-muted"></i></span>
                  <input type="tel" name="phone" class="form-control"
                         th:value="${user.phone}" placeholder="+91 XXXXX XXXXX">
                </div>
              </div>
            </div>

            <!-- Password section -->
            <div class="p-3 mb-4" style="background:#f8f9fc; border-radius:12px; border:1.5px dashed #e0e0e0;">
              <div class="d-flex align-items-center gap-2 mb-3">
                <i class="fas fa-lock" style="color:#667eea;"></i>
                <span class="fw-bold small" style="color:#1a1a2e;">Change Password</span>
                <span class="badge bg-secondary ms-1" style="font-size:0.65rem;">Optional</span>
              </div>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-key text-muted"></i></span>
                <input type="password" name="newPassword" id="newPwd" class="form-control"
                       placeholder="Leave blank to keep current password" minlength="6">
                <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()">
                  <i class="fas fa-eye" id="pwdEye"></i>
                </button>
              </div>
            </div>

            <div class="d-flex gap-3">
              <button type="submit" class="btn btn-primary px-4 py-2 fw-bold">
                <i class="fas fa-save me-2"></i>Save Changes
              </button>
              <a th:href="@{/home}" class="btn btn-outline-secondary px-4 py-2">
                Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
function togglePwd() {
  const f = document.getElementById('newPwd');
  const i = document.getElementById('pwdEye');
  if (f.type === 'password') { f.type = 'text'; i.className = 'fas fa-eye-slash'; }
  else { f.type = 'password'; i.className = 'fas fa-eye'; }
}
</script>
</body>
</html>
