<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title}, ~{::body})}">
<head><title>Contact Us | TravelHub</title></head>
<body>
<div class="container py-5" style="max-width:900px;">
  <div class="text-center mb-5">
    <h2 class="section-title">Get in Touch</h2>
    <p class="section-subtitle">Have questions about your trip? We're here to help 24/7.</p>
  </div>

  <div class="row g-4">
    <div class="col-md-4">
      <div class="card shadow-sm p-4 h-100">
        <div class="d-flex flex-column gap-4">
          <div class="d-flex align-items-start gap-3">
            <div style="width:44px; height:44px; background:#fff0f3; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <i class="fas fa-envelope" style="color:#e94560;"></i>
            </div>
            <div>
              <div class="fw-bold small">Email</div>
              <div class="text-muted small">support@travelhub.com</div>
            </div>
          </div>
          <div class="d-flex align-items-start gap-3">
            <div style="width:44px; height:44px; background:#fff8e1; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <i class="fas fa-phone" style="color:#f5a623;"></i>
            </div>
            <div>
              <div class="fw-bold small">Phone</div>
              <div class="text-muted small">+91-9015409405</div>
            </div>
          </div>
          <div class="d-flex align-items-start gap-3">
            <div style="width:44px; height:44px; background:#f0f4ff; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <i class="fas fa-map-marker-alt" style="color:#667eea;"></i>
            </div>
            <div>
              <div class="fw-bold small">Office</div>
              <div class="text-muted small">New Delhi, India</div>
            </div>
          </div>
          <div class="d-flex align-items-start gap-3">
            <div style="width:44px; height:44px; background:#f0fff4; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
              <i class="fas fa-clock" style="color:#56ab2f;"></i>
            </div>
            <div>
              <div class="fw-bold small">Support Hours</div>
              <div class="text-muted small">24/7 Available</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm p-4">
        <h5 class="fw-bold mb-4" style="color:#1a1a2e;">Send us a Message</h5>
        <form id="contactForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Your Name</label>
              <input type="text" class="form-control" placeholder="Full name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="col-12">
              <label class="form-label">Subject</label>
              <select class="form-select">
                <option>Booking Inquiry</option>
                <option>Payment Issue</option>
                <option>Trip Cancellation</option>
                <option>General Question</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="4" placeholder="Tell us how we can help..." required></textarea>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary px-4 py-2">
                <i class="fas fa-paper-plane me-2"></i>Send Message
              </button>
            </div>
          </div>
        </form>
        <div id="successAlert" class="alert alert-success d-flex align-items-center mt-3 d-none" style="border-radius:10px; border:none;">
          <i class="fas fa-check-circle me-2"></i>Your message has been sent! We'll get back to you within 24 hours.
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const alert = document.getElementById('successAlert');
  alert.classList.remove('d-none');
  this.reset();
  setTimeout(() => alert.classList.add('d-none'), 5000);
});
</script>
</body>
</html>
