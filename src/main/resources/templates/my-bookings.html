<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title}, ~{::body})}">
<head><title>My Bookings | TravelHub</title></head>
<body>
<div class="container py-5">

  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
    <div>
      <h3 class="fw-bold mb-0" style="color:#1a1a2e;"><i class="fas fa-suitcase me-2" style="color:#e94560;"></i>My Bookings</h3>
      <p class="text-muted mb-0">All your travel bookings in one place</p>
    </div>
    <a th:href="@{/home}" class="btn btn-primary">
      <i class="fas fa-plus me-2"></i>Book New Trip
    </a>
  </div>

  <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-5">
    <div style="width:100px; height:100px; background:#f0f4ff; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem;">
      <i class="fas fa-suitcase-rolling fa-2x" style="color:#e94560;"></i>
    </div>
    <h5 class="fw-bold" style="color:#1a1a2e;">No bookings yet</h5>
    <p class="text-muted">Start exploring and book your first trip!</p>
    <a th:href="@{/home}" class="btn btn-primary px-4">Explore Destinations</a>
  </div>

  <div th:if="${not #lists.isEmpty(bookings)}">
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card shadow-sm p-3 text-center">
          <div class="fw-bold fs-4" style="color:#e94560;" th:text="${#lists.size(bookings)}">0</div>
          <div class="text-muted small">Total Bookings</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm p-3 text-center">
          <div class="fw-bold fs-4" style="color:#56ab2f;" th:text="${paidCount}">0</div>
          <div class="text-muted small">Confirmed</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm p-3 text-center">
          <div class="fw-bold fs-4" style="color:#f5a623;" th:text="${pendingCount}">0</div>
          <div class="text-muted small">Pending</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm p-3 text-center">
          <div class="fw-bold fs-4" style="color:#667eea;">
            ₹<span th:text="${#numbers.formatInteger(totalSpent, 1, 'COMMA')}">0</span>
          </div>
          <div class="text-muted small">Total Spent</div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div th:each="booking : ${bookings}" class="col-12">
        <div class="card shadow-sm overflow-hidden">
          <div class="row g-0 align-items-center">
            <div class="col-md-2">
              <img th:src="@{'/images/' + ${booking.place.toLowerCase().replace(' ','')} + '.jpg'}"
                   style="width:100%; height:120px; object-fit:cover;" alt="">
            </div>
            <div class="col-md-7 p-3">
              <div class="d-flex align-items-center gap-2 mb-1">
                <h6 class="fw-bold mb-0" th:text="${booking.place}">Place</h6>
                <span th:class="${booking.paymentStatus == 'PAID'} ? 'badge bg-success' : (${booking.paymentStatus == 'PENDING'} ? 'badge bg-warning text-dark' : 'badge bg-danger')"
                      th:text="${booking.paymentStatus}">Status</span>
              </div>
              <div class="text-muted small mb-2">
                <i class="fas fa-hashtag me-1"></i><span th:text="${booking.tripId}"></span>
                &nbsp;|&nbsp;
                <i class="fas fa-calendar me-1"></i><span th:text="${booking.travelDate}"></span>
                &nbsp;|&nbsp;
                <i class="fas fa-users me-1"></i><span th:text="${booking.numberOfPeople}"></span> traveler(s)
              </div>
              <div class="text-muted small">
                <i class="fas fa-user me-1"></i><span th:text="${booking.travelerName}"></span>
                &nbsp;|&nbsp;
                <i class="fas fa-envelope me-1"></i><span th:text="${booking.travelerEmail}"></span>
              </div>
            </div>
            <div class="col-md-3 p-3 text-end">
              <div class="fw-bold fs-5" style="color:#e94560;">
                ₹<span th:text="${#numbers.formatInteger(booking.totalAmount, 1, 'COMMA')}"></span>
              </div>
              <div class="text-muted small mb-2" th:text="${#temporals.format(booking.bookedAt, 'dd MMM yyyy')}"></div>
              <span th:if="${booking.razorpayPaymentId != null}" class="badge bg-light text-muted d-block mb-2" style="font-size:0.7rem;">
                <i class="fas fa-credit-card me-1"></i>Razorpay
              </span>
              <a th:href="@{/booking/detail/{id}(id=${booking.id})}" class="btn btn-sm btn-outline-primary">
                <i class="fas fa-eye me-1"></i>View Details
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
