<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | TravelHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; display: flex; }
  .auth-left {
    flex: 1; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 3rem; position: relative; overflow: hidden;
  }
  .auth-left::before {
    content: ''; position: absolute; width: 400px; height: 400px;
    background: rgba(233,69,96,0.15); border-radius: 50%; top: -100px; right: -100px;
  }
  .auth-left::after {
    content: ''; position: absolute; width: 300px; height: 300px;
    background: rgba(102,126,234,0.15); border-radius: 50%; bottom: -80px; left: -80px;
  }
  .auth-right {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #f8f9fc; padding: 2rem;
  }
  .auth-card { width: 100%; max-width: 420px; }
  .brand-logo { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #fff; margin-bottom: 1rem; }
  .brand-logo span { color: #e94560; }
  .form-control { border-radius: 10px; border: 1.5px solid #e0e0e0; padding: 0.75rem 1rem; font-size: 0.95rem; }
  .form-control:focus { border-color: #e94560; box-shadow: 0 0 0 3px rgba(233,69,96,0.1); }
  .btn-login { background: #e94560; border: none; border-radius: 10px; padding: 0.75rem; font-weight: 600; font-size: 1rem; width: 100%; color: #fff; transition: background 0.2s; }
  .btn-login:hover { background: #c73652; }
  .input-group-text { border-radius: 10px 0 0 10px; border: 1.5px solid #e0e0e0; border-right: none; background: #f8f9fc; color: #888; }
  .input-group .form-control { border-radius: 0 10px 10px 0; border-left: none; }
  .input-group .form-control:focus { border-color: #e94560; }
  .divider { display: flex; align-items: center; gap: 1rem; color: #aaa; font-size: 0.85rem; margin: 1.2rem 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }
  @media (max-width: 768px) { .auth-left { display: none; } .auth-right { flex: 1; } }
</style>
</head>
<body>

<div class="auth-left d-none d-md-flex">
  <div class="text-center position-relative" style="z-index:1;">
    <div class="brand-logo"><i class="fas fa-compass me-2"></i>Travel<span>Hub</span></div>
    <p style="color:rgba(255,255,255,0.7); font-size:1.1rem; max-width:320px;">
      Your AI-powered travel companion. Discover the world's best destinations at unbeatable prices.
    </p>
    <div class="d-flex justify-content-center gap-4 mt-4">
      <div class="text-center">
        <div style="font-size:1.8rem; font-weight:700; color:#f5a623;">10K+</div>
        <div style="font-size:0.8rem; color:rgba(255,255,255,0.6);">Travelers</div>
      </div>
      <div style="width:1px; background:rgba(255,255,255,0.2);"></div>
      <div class="text-center">
        <div style="font-size:1.8rem; font-weight:700; color:#f5a623;">50+</div>
        <div style="font-size:0.8rem; color:rgba(255,255,255,0.6);">Destinations</div>
      </div>
      <div style="width:1px; background:rgba(255,255,255,0.2);"></div>
      <div class="text-center">
        <div style="font-size:1.8rem; font-weight:700; color:#f5a623;">4.9★</div>
        <div style="font-size:0.8rem; color:rgba(255,255,255,0.6);">Rating</div>
      </div>
    </div>
  </div>
</div>

<div class="auth-right">
  <div class="auth-card">
    <div class="mb-4">
      <h2 class="fw-bold mb-1" style="color:#1a1a2e;">Welcome back 👋</h2>
      <p class="text-muted">Sign in to continue your journey</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" style="border-radius:10px; border:none;">
      <i class="fas fa-exclamation-circle me-2"></i> Invalid username or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" style="border-radius:10px; border:none;">
      <i class="fas fa-check-circle me-2"></i> Logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">
      <div class="mb-3">
        <label class="form-label fw-500" style="font-weight:500; color:#555;">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" style="font-weight:500; color:#555;">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" id="passwordField" class="form-control" placeholder="Enter your password" required>
          <button type="button" class="btn btn-outline-secondary" style="border-radius:0 10px 10px 0; border:1.5px solid #e0e0e0; border-left:none;" onclick="togglePassword()">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login mb-3">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <div class="divider">or</div>
    <p class="text-center text-muted mb-0" style="font-size:0.95rem;">
      Don't have an account? <a th:href="@{/signup}" style="color:#e94560; font-weight:600; text-decoration:none;">Create one free</a>
    </p>
  </div>
</div>

<script>
function togglePassword() {
  const f = document.getElementById('passwordField');
  const i = document.getElementById('eyeIcon');
  if (f.type === 'password') { f.type = 'text'; i.className = 'fas fa-eye-slash'; }
  else { f.type = 'password'; i.className = 'fas fa-eye'; }
}
</script>
</body>
</html>
