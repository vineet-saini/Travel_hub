<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
th:replace="~{base :: layout(~{::title},~{::body})}">

<head>
<title>Confirm Booking</title>
</head>

<body>

<div class="text-center mb-4">

<h1 class="text-success fw-bold">
<i class="fas fa-check-circle"></i> Confirm Your Booking
</h1>

<p class="text-muted">
You are booking a travel package for
<strong th:text="${place}">Place</strong>
</p>

</div>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow border-0">

<div class="card-header bg-success text-white text-center">
<h5>Package Summary</h5>
</div>

<div class="card-body text-center">

<h3 class="text-primary" th:text="${place}"></h3>

<p class="text-muted">
5 Days / 4 Nights Travel Package
</p>

<h2 class="text-success fw-bold">
$399
</h2>

<p class="text-muted">Per Person</p>

<hr>

<button class="btn btn-warning w-100 mb-3">
<i class="fas fa-credit-card"></i> Pay Now
</button>

<button class="btn btn-success w-100">
<i class="fas fa-check"></i> Confirm Booking
</button>

<a th:href="@{/home}" class="btn btn-outline-secondary w-100 mt-3">
Back to Home
</a>

</div>

</div>

</div>

</div>

</body>
</html>
